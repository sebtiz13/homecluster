apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-k8s-stack
spec:
  values:
    vmsingle:
      spec:
        retentionPeriod: "1" # 1 month
        storage:
          resources:
            requests:
              storage: 5Gi
        resources:
          requests:
            cpu: 300m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
