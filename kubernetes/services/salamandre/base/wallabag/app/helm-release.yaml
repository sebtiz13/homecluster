---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name wallabag
spec:
  releaseName: *name
  interval: 1h
  chart:
    spec:
      chart: wallabag
      version: "0.6.0"
      sourceRef:
        kind: HelmRepository
        name: wallabag
  values:
    annotations:
      reloader.stakater.com/auto: "true"
    ingress:
      enabled: true
      host: "bag.${DOMAIN_NAME}"
      tls:
        enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 600m
        memory: 384Mi
    externalDatabase:
      driver: "pdo_pgsql"
      existingSecret: "wallabag-db-credentials"
    persistence:
      enabled: true
      storageClass: "openebs-zfspv"
      size: 1Gi
      labels:
        backup.local/enabled: "true"
      extraVolumes:
        - name: wallabag-cache
          mountPath: /var/www/wallabag/var
          size: 1Gi
    extraVolumes:
      - name: extras
        mountPath: /etc/nginx/nginx.conf
        readOnly: true
        subPath: nginx.conf
        volume:
          configMap:
            name: wallabag-nginx
    livenessProbe:
      enabled: true
    readinessProbe:
      enabled: true
    startupProbe:
      enabled: true
    wallabag:
      timezone: "${TIMEZONE}"
      serverName: "Sebtiz's Wallabag"
      fos:
        userRegistration: false
