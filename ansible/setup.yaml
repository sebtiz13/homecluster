- name: Install common requirement and create namespaces
  hosts: all
  tags: common
  roles:
    - role: common
      become: true

- name: Install sensors
  hosts: salamandre
  roles:
    - role: salamandre_sensors
      when: motherboard_chip is defined
      connection: ssh
      become: true
      tags: sensors

- name: Merge kubeconfigs locally
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Merge all kubeconfigs into out/kubeconfig
      changed_when: false
      ansible.builtin.shell: |
        set -o pipefail
        CONFIGS="{{ groups['all']
          | map('extract', hostvars, 'kubeconfig_tmp_path')
          | select('defined')
          | join(':') }}"
        KUBECONFIG="${CONFIGS}" kubectl config view --merge --flatten \
          > "{{ local_kubeconfig }}"
        chmod 600 "{{ local_kubeconfig }}"

    - name: Remove temporary kubeconfig files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ groups['all']
        | map('extract', hostvars, 'kubeconfig_tmp_path')
        | select('defined')
        | list }}"
